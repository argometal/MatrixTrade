name = "matrixtrade-bridge"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# After: wrangler kv namespace create SNAPSHOT
# Paste the returned id below (production).
[[kv_namespaces]]
binding = "SNAPSHOT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Optional: for wrangler dev — create with: wrangler kv namespace create SNAPSHOT --preview
# preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[observability]
enabled = true
